apiVersion: v1
data:
  selfheal-cp.json: "{\n  \"title\": \"SelfHeal Control Plane\",\n  \"uid\": \"selfheal-cp\"\
    ,\n  \"tags\": [\n    \"selfheal\",\n    \"ebpf\"\n  ],\n  \"timezone\": \"browser\"\
    ,\n  \"refresh\": \"5s\",\n  \"schemaVersion\": 36,\n  \"panels\": [\n    {\n\
    \      \"type\": \"stat\",\n      \"title\": \"Total eBPF Signals\",\n      \"\
    gridPos\": {\n        \"h\": 6,\n        \"w\": 8,\n        \"x\": 0,\n      \
    \  \"y\": 0\n      },\n      \"targets\": [\n        {\n          \"expr\": \"\
    sum(selfheal_signals_total)\",\n          \"refId\": \"A\"\n        }\n      ],\n\
    \      \"options\": {\n        \"colorMode\": \"value\",\n        \"graphMode\"\
    : \"area\"\n      },\n      \"datasource\": {\n        \"type\": \"prometheus\"\
    ,\n        \"uid\": \"prometheus\"\n      }\n    },\n    {\n      \"type\": \"\
    stat\",\n      \"title\": \"Anomalies Detected\",\n      \"gridPos\": {\n    \
    \    \"h\": 6,\n        \"w\": 8,\n        \"x\": 8,\n        \"y\": 0\n     \
    \ },\n      \"targets\": [\n        {\n          \"expr\": \"sum(selfheal_anomalies_detected_total)\"\
    ,\n          \"refId\": \"A\"\n        }\n      ],\n      \"options\": {\n   \
    \     \"colorMode\": \"value\",\n        \"graphMode\": \"area\"\n      },\n \
    \     \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"\
    prometheus\"\n      }\n    },\n    {\n      \"type\": \"stat\",\n      \"title\"\
    : \"Actions Dispatched\",\n      \"gridPos\": {\n        \"h\": 6,\n        \"\
    w\": 8,\n        \"x\": 16,\n        \"y\": 0\n      },\n      \"targets\": [\n\
    \        {\n          \"expr\": \"sum(selfheal_actions_dispatched_total)\",\n\
    \          \"refId\": \"A\"\n        }\n      ],\n      \"options\": {\n     \
    \   \"colorMode\": \"value\",\n        \"graphMode\": \"area\"\n      },\n   \
    \   \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"\
    prometheus\"\n      }\n    },\n    {\n      \"type\": \"timeseries\",\n      \"\
    title\": \"Signals Rate (by metric)\",\n      \"gridPos\": {\n        \"h\": 8,\n\
    \        \"w\": 12,\n        \"x\": 0,\n        \"y\": 6\n      },\n      \"targets\"\
    : [\n        {\n          \"expr\": \"sum by (metric) (rate(selfheal_signals_total[1m]))\"\
    ,\n          \"legendFormat\": \"{{metric}}\",\n          \"refId\": \"A\"\n \
    \       }\n      ],\n      \"datasource\": {\n        \"type\": \"prometheus\"\
    ,\n        \"uid\": \"prometheus\"\n      }\n    },\n    {\n      \"type\": \"\
    timeseries\",\n      \"title\": \"Anomalies Rate (by type)\",\n      \"gridPos\"\
    : {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 12,\n        \"y\"\
    : 6\n      },\n      \"targets\": [\n        {\n          \"expr\": \"sum by (type)\
    \ (rate(selfheal_anomalies_detected_total[1m]))\",\n          \"legendFormat\"\
    : \"{{type}}\",\n          \"refId\": \"A\"\n        }\n      ],\n      \"datasource\"\
    : {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus\"\n    \
    \  }\n    },\n    {\n      \"type\": \"timeseries\",\n      \"title\": \"Actions\
    \ Dispatched (by action)\",\n      \"gridPos\": {\n        \"h\": 8,\n       \
    \ \"w\": 12,\n        \"x\": 0,\n        \"y\": 14\n      },\n      \"targets\"\
    : [\n        {\n          \"expr\": \"sum by (action) (rate(selfheal_actions_dispatched_total[1m]))\"\
    ,\n          \"legendFormat\": \"{{action}}\",\n          \"refId\": \"A\"\n \
    \       }\n      ],\n      \"datasource\": {\n        \"type\": \"prometheus\"\
    ,\n        \"uid\": \"prometheus\"\n      }\n    },\n    {\n      \"type\": \"\
    timeseries\",\n      \"title\": \"Pod Restarts\",\n      \"gridPos\": {\n    \
    \    \"h\": 8,\n        \"w\": 12,\n        \"x\": 12,\n        \"y\": 14\n  \
    \    },\n      \"targets\": [\n        {\n          \"expr\": \"sum by (pod) (selfheal_pod_restart_count)\"\
    ,\n          \"legendFormat\": \"{{pod}}\",\n          \"refId\": \"A\"\n    \
    \    }\n      ],\n      \"datasource\": {\n        \"type\": \"prometheus\",\n\
    \        \"uid\": \"prometheus\"\n      }\n    }\n  ]\n}"
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: '1'
  name: selfheal-dashboard
  namespace: monitoring
