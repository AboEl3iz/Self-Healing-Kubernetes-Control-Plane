---
# Analyzer Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selfheal-analyzer
  namespace: kube-system
  labels:
    app: selfheal-analyzer
    component: selfheal-cp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selfheal-analyzer
  template:
    metadata:
      labels:
        app: selfheal-analyzer
        component: selfheal-cp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: selfheal-agent
      # Wait for NATS JetStream to be fully ready before starting the analyzer.
      # Without this, EnsureStream fires before JetStream is initialized and
      # gets code=500 errors even though the NATS pod is "Running".
      initContainers:
        - name: wait-for-nats
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo 'Waiting for NATS JetStream to be ready...'
              until wget -qO- http://selfheal-nats:8222/healthz 2>/dev/null | grep -q '"status":"ok"'; do
                echo 'NATS not ready yet, retrying in 2s...'
                sleep 2
              done
              echo 'NATS is ready.'
      containers:
        - name: analyzer
          image: selfheal-analyzer:v2
          imagePullPolicy: Never
          args:
            - "--nats-url=nats://selfheal-nats:4222"
            - "--rules-file=/etc/selfheal/rules.yaml"
            - "--metrics-addr=:8081"
            - "--log-level=info"
            - "--dry-run=false"
          ports:
            - name: metrics
              containerPort: 8081
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/selfheal
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: selfheal-config

---
# Controller Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selfheal-controller
  namespace: kube-system
  labels:
    app: selfheal-controller
    component: selfheal-cp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selfheal-controller
  template:
    metadata:
      labels:
        app: selfheal-controller
        component: selfheal-cp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: selfheal-agent
      # Same NATS readiness gate as the analyzer.
      initContainers:
        - name: wait-for-nats
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo 'Waiting for NATS JetStream to be ready...'
              until wget -qO- http://selfheal-nats:8222/healthz 2>/dev/null | grep -q '"status":"ok"'; do
                echo 'NATS not ready yet, retrying in 2s...'
                sleep 2
              done
              echo 'NATS is ready.'
      containers:
        - name: controller
          image: selfheal-controller:v3
          imagePullPolicy: Never
          args:
            - "--nats-url=nats://selfheal-nats:4222"
            - "--guardrails-file=/etc/selfheal/guardrails.yaml"
            - "--metrics-addr=:8082"
            - "--dry-run=false"
            - "--log-level=info"
          ports:
            - name: metrics
              containerPort: 8082
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/selfheal
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: selfheal-config

