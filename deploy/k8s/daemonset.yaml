apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: selfheal-agent
  namespace: kube-system
  labels:
    app: selfheal-agent
    component: selfheal-cp
spec:
  selector:
    matchLabels:
      app: selfheal-agent
  template:
    metadata:
      labels:
        app: selfheal-agent
        component: selfheal-cp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:

      serviceAccountName: selfheal-agent
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        # Run on master/control-plane nodes as well
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
      containers:
        - name: selfheal-agent
          image: selfheal-agent:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            capabilities:
              add:
                - BPF
                - PERFMON
                - SYS_ADMIN
                - SYS_RESOURCE
                - NET_ADMIN
                - DAC_READ_SEARCH
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          args:
            - "--cpu-bpf=/app/ebpf/probes/cpu.o"
            - "--mem-bpf=/app/ebpf/probes/memory.o"
            - "--io-bpf=/app/ebpf/probes/io.o"
            - "--net-bpf=/app/ebpf/probes/network.o"
            - "--sys-bpf=/app/ebpf/probes/syscall.o"
            - "--kubernetes"
            - "--dry-run=false"
            - "--nats-url=nats://selfheal-nats:4222"
          ports:
            - name: metrics
              containerPort: 8080
              hostPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: bpffs
              mountPath: /sys/fs/bpf
            - name: debugfs
              mountPath: /sys/kernel/debug
            - name: tracefs
              mountPath: /sys/kernel/tracing
            - name: modules
              mountPath: /lib/modules
              readOnly: true
      volumes:
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
        - name: tracefs
          hostPath:
            path: /sys/kernel/tracing
        - name: modules
          hostPath:
            path: /lib/modules
