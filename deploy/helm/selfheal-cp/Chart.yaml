apiVersion: v2
name: selfheal-cp
description: |
  SelfHeal Control Plane — An autonomous Kubernetes healing system.

  Comprises three components:
    - Agent (DaemonSet): eBPF signal collector on every node
    - Analyzer (Deployment): Heuristics engine, anomaly detection, causal reasoning
    - Controller (Deployment): Healing action dispatcher with guardrails

