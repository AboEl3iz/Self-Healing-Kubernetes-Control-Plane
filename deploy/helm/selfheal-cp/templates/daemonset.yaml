{{/*
Agent DaemonSet — eBPF signal collector, runs on every node.
Requires: CAP_BPF, CAP_NET_ADMIN, CAP_PERFMON, hostPID=true.
*/}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "selfheal-cp.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "selfheal-cp.labels" . | nindent 4 }}
    component: agent
spec:
  selector:
    matchLabels:
      {{- include "selfheal-cp.selectorLabels" . | nindent 6 }}
      component: agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        {{- include "selfheal-cp.selectorLabels" . | nindent 8 }}
        component: agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.agent.metricsPort | quote }}
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ .Values.rbac.serviceAccountName }}
      hostPID: true
      priorityClassName: system-node-critical
      tolerations:
        {{- toYaml .Values.agent.tolerations | nindent 8 }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: "{{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}"
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          args:
            - "--nats-url={{ .Values.global.nats.url }}"
            - "--poll-interval-ms={{ .Values.agent.pollIntervalMs }}"
            - "--metrics-addr=:{{ .Values.agent.metricsPort }}"
            - "--log-level=info"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- with .Values.agent.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.agent.metricsPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - BPF
                - NET_ADMIN
                - PERFMON
          volumeMounts:
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: proc
              mountPath: /proc
              readOnly: true
            - name: debugfs
              mountPath: /sys/kernel/debug
            - name: bpffs
              mountPath: /sys/fs/bpf
            {{- with .Values.agent.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: sys
          hostPath:
            path: /sys
        - name: proc
          hostPath:
            path: /proc
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
