{{- if .Values.rbac.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "selfheal-cp.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "selfheal-cp.fullname" . }}
  labels:
    {{- include "selfheal-cp.labels" . | nindent 4 }}
rules:
  # Read cluster topology (for dependency graph)
  - apiGroups: [""]
    resources: ["nodes", "pods", "namespaces", "persistentvolumes", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]

  # Healing actions — Pod management
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]

  # Healing actions — Node cordon
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["patch", "update"]

  # Healing actions — Deployment resource patch
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "patch", "update"]

  # Audit trail — Kubernetes Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # Metrics (for ServiceMonitor)
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "selfheal-cp.fullname" . }}
  labels:
    {{- include "selfheal-cp.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "selfheal-cp.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
