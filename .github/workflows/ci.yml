name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

env:
  GO_VERSION: "1.23"

jobs:

  # ─── Lint & Format ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check Go formatting
        run: |
          unformatted=$(gofmt -l ./cmd ./internal)
          if [ -n "$unformatted" ]; then
            echo "❌ Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ─── Go Build ───────────────────────────────────────────────────────────────
  build-go:
    name: Build Go Binaries
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build agent
        run: go build -v ./cmd/agent/...

      - name: Build analyzer
        run: go build -v ./cmd/analyzer/...

      - name: Build controller
        run: go build -v ./cmd/controller/...

      - name: Build observer
        run: go build -v ./cmd/observer/...

  # ─── Unit Tests ─────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests
        run: go test -v -count=1 -race -coverprofile=coverage.out ./tests/unit/... ./internal/...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  # ─── eBPF Compile (syntax check) ────────────────────────────────────────────
  bpf-compile:
    name: eBPF Probe Compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang llvm libbpf-dev \
            linux-headers-$(uname -r) 2>/dev/null || \
            sudo apt-get install -y linux-headers-generic

      - name: Compile core probes
        run: |
          CFLAGS="-O2 -g -target bpf -D__TARGET_ARCH_x86"
          for src in ebpf/probes/*.c; do
            obj="${src%.c}.o"
            echo "Compiling $src → $obj"
            clang $CFLAGS -I/usr/include/x86_64-linux-gnu -c "$src" -o "$obj"
          done

      - name: Compile security probes
        run: |
          CFLAGS="-O2 -g -target bpf -D__TARGET_ARCH_x86"
          for src in ebpf/security/*.c; do
            obj="${src%.c}.o"
            echo "Compiling $src → $obj"
            clang $CFLAGS -I/usr/include/x86_64-linux-gnu -c "$src" -o "$obj"
          done

  # ─── Proto Validation ───────────────────────────────────────────────────────
  proto-validate:
    name: Validate Protobuf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler

      - name: Validate proto syntax
        run: |
          for f in proto/*.proto; do
            echo "Validating $f"
            protoc --proto_path=proto "$f" --descriptor_set_out=/dev/null
          done
