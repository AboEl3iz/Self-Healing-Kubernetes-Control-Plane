# SelfHeal-CP — Development Environment
# ============================================================
# Starts: NATS JetStream + Prometheus + Grafana
#
# Usage:
#   make dev-up    → start
#   make dev-down  → stop
#   make dev-logs  → tail logs
#
# Ports:
#   4222   — NATS client
#   8222   — NATS monitoring HTTP UI
#   9090   — Prometheus
#   3000   — Grafana (admin/admin)
# ============================================================

version: "3.9"

services:

  # ─── NATS JetStream ─────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: selfheal-nats
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
      - "--name=selfheal-dev"
    ports:
      - "4222:4222"       # NATS client connections
      - "8222:8222"       # NATS HTTP monitoring UI
    volumes:
      - nats-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: selfheal-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped

  # ─── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: selfheal-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  nats-data:
  prometheus-data:
  grafana-data:
